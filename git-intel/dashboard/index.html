<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Intel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Top bar ── -->
  <header id="topbar">
    <h1>Git Intel</h1>
    <button id="sync-btn" type="button">↻ Sync</button>
    <a href="diagrams.html" id="diag-link">⬡ Architecture</a>
  </header>

  <!-- ── Layout shell ── -->
  <div id="shell">

    <!-- ── Left sidebar ── -->
    <aside id="sidebar">
      <div id="sidebar-header">Repository</div>

      <select id="repo-select" aria-label="Select repository">
        <option value="">Loading…</option>
      </select>

      <div id="tree-header">File Tree</div>
      <nav id="file-tree" aria-label="File tree"></nav>
    </aside>

    <!-- ── Main content ── -->
    <main id="main">
      <div id="timeline-header">Change Timeline</div>
      <div id="timeline" aria-live="polite">
        <p id="empty-state">Loading…</p>
      </div>

      <footer id="footer">
        Last updated: <span id="last-updated">—</span>
      </footer>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
